<!-- imports/ui/App.html -->
<template name="mainContainer">
  {{#if currentUser}}
    <div class="container">
      <div class="header">
        <h1>To Do List</h1>
        
        <div class="filter-bar">
          <span>{{pendingTasksCount}} task(s) remaining</span>
          <button class="hide-completed">
            {{#if hideCompleted}}
              Show All
            {{else}}
              Hide Completed
            {{/if}}
          </button>
          <button class="logout-btn">Logout</button>
        </div>
      </div>

      <div class="main">
        {{> form }}

        {{#if isLoading}}
          <p class="loading">Loading...</p>
        {{else}}
          <ul class="task-list">
            {{#each tasks}}
              {{> task}}
            {{/each}}
          </ul>
        {{/if}}
      </div>
    </div>
  {{else}}
    {{> login}}
  {{/if}}
</template>

<template name="form">
  <form class="task-form">
    <input type="text" name="text" placeholder="Type a new task" />
    <button type="submit">Add Task</button>
  </form>
</template>
