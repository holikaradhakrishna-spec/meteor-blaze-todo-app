<template name="mainContainer">
  {{#if currentUser}}
    <div class="container">
      <div class="header">
        <h1>To Do List</h1>
        
        <div class="filter-bar">
          <span>{{pendingTasksCount}} task(s) remaining</span>
          <button class="hide-completed">
            {{#if hideCompleted}}
              Show All
            {{else}}
              Hide Completed
            {{/if}}
          </button>
          <button class="logout-btn">Logout</button>
        </div>
      </div>

      <div class="main">
        {{> form }}

        {{#if isLoading}}
          <p class="loading">Loading...</p>
        {{else}}
          {{> taskList tasks=tasks}}
        {{/if}}
      </div>
    </div>
  {{else}}
    {{> login}}
  {{/if}}
</template>

<template name="taskList">
  <ul class="task-list">
    {{#each tasks}}
      {{> task}}
    {{/each}}
  </ul>
</template>

<template name="form">
  <form class="task-form">
    <input type="text" name="text" placeholder="Type a new task" />
    <select name="category">
      <option value="" disabled selected>(Select Category)</option>
      <option value="Work">Work</option>
      <option value="Personal">Personal</option>
      <option value="Urgent">Urgent</option>
    </select>
    <button type="submit">Add Task</button>
  </form>
</template>
